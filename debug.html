<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Realms - DEBUG MODE</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Debug overlay */
        #debug-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 350px;
            max-height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            overflow-y: auto;
            z-index: 9999;
            border-left: 2px solid #0f0;
        }
        #debug-overlay h3 { margin: 10px 0 5px; color: #ff0; }
        #debug-overlay .ok { color: #51cf66; }
        #debug-overlay .err { color: #ff6b6b; }
        #debug-overlay .warn { color: #fcc419; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Header -->
        <header id="game-header">
            <h1>🏰 Mystic Realms (DEBUG)</h1>
            <div id="turn-indicator">
                <span id="turn-text">Your Turn</span>
            </div>
        </header>

        <!-- Opponent Area -->
        <section id="opponent-area">
            <div class="player-info">
                <div class="avatar">🧙‍♂️</div>
                <div class="stats">
                    <div class="stat-bar hp-bar">
                        <span class="label">HP</span>
                        <div class="bar-container">
                            <div id="opponent-hp-bar" class="bar-fill"></div>
                        </div>
                        <span id="opponent-hp" class="value">20/20</span>
                    </div>
                    <div class="stat-bar mana-bar">
                        <span class="label">Mana</span>
                        <div class="bar-container">
                            <div id="opponent-mana-bar" class="bar-fill"></div>
                        </div>
                        <span id="opponent-mana" class="value">0/0</span>
                    </div>
                    <div class="deck-count">📚 Deck: <span id="opponent-deck-count">20</span></div>
                    <div class="hand-count">🎴 Hand: <span id="opponent-hand-count">7</span></div>
                </div>
            </div>
            <div id="opponent-hand" class="hand"></div>
        </section>

        <!-- Battle Area -->
        <section id="battle-area">
            <div id="battle-log">
                <div class="log-entry">Welcome to Mystic Realms!</div>
            </div>
        </section>

        <!-- Player Area -->
        <section id="player-area">
            <div id="player-hand" class="hand"></div>
            <div class="player-info">
                <div class="stats">
                    <div class="stat-bar hp-bar">
                        <span class="label">HP</span>
                        <div class="bar-container">
                            <div id="player-hp-bar" class="bar-fill"></div>
                        </div>
                        <span id="player-hp" class="value">20/20</span>
                    </div>
                    <div class="stat-bar mana-bar">
                        <span class="label">Mana</span>
                        <div class="bar-container">
                            <div id="player-mana-bar" class="bar-fill"></div>
                        </div>
                        <span id="player-mana" class="value">0/0</span>
                    </div>
                    <div class="deck-count">📚 Deck: <span id="player-deck-count">20</span></div>
                    <div class="hand-count">🎴 Hand: <span id="player-hand-count">0</span></div>
                </div>
                <div class="avatar">🦸</div>
            </div>
        </section>

        <!-- Controls -->
        <section id="controls">
            <button id="end-turn-btn" disabled>End Turn</button>
        </section>

        <!-- Tooltip -->
        <div id="tooltip" class="tooltip"></div>

        <!-- Game Over Modal -->
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="game-over-title">Game Over</h2>
                <p id="game-over-message"></p>
                <button id="restart-btn">Play Again</button>
            </div>
        </div>
    </div>

    <!-- Debug Overlay -->
    <div id="debug-overlay">
        <h3>🔍 Debug Console</h3>
        <div id="debug-content">Loading...</div>
    </div>

    <script type="module">
        // Enhanced debug logging
        const debugContent = document.getElementById('debug-content');
        const logs = [];
        
        function updateDebug() {
            const game = window.mysticRealms;
            let html = '';
            
            if (!game) {
                html += '<div class="err">❌ Game not initialized</div>';
            } else {
                html += '<div class="ok">✅ Game initialized</div>';
                
                const state = game.state;
                if (state) {
                    html += '<h3>State</h3>';
                    html += `<div>Status: ${state.status}</div>`;
                    html += `<div>Turn: ${state.turnNumber}</div>`;
                    html += `<div>Current: ${state.currentPlayer}</div>`;
                    
                    const human = state.players?.human;
                    const ai = state.players?.ai;
                    
                    if (human) {
                        html += '<h3>👤 Human</h3>';
                        html += `<div>HP: ${human.hp}/${human.maxHp}</div>`;
                        html += `<div>Mana: ${human.mana}/${human.maxMana}</div>`;
                        html += `<div>Deck: ${human.deck?.length || 0}</div>`;
                        html += `<div>Hand: ${human.hand?.length || 0}</div>`;
                        if (human.hand?.length > 0) {
                            html += '<div class="warn">Cards: ' + human.hand.map(c => c.name).join(', ') + '</div>';
                        }
                    } else {
                        html += '<div class="err">❌ No human player data!</div>';
                    }
                    
                    if (ai) {
                        html += '<h3>🤖 AI</h3>';
                        html += `<div>HP: ${ai.hp}/${ai.maxHp}</div>`;
                        html += `<div>Deck: ${ai.deck?.length || 0}</div>`;
                        html += `<div>Hand: ${ai.hand?.length || 0}</div>`;
                    } else {
                        html += '<div class="err">❌ No AI player data!</div>';
                    }
                }
                
                const renderer = game.renderer;
                if (renderer?.elements) {
                    html += '<h3>🎨 Renderer Elements</h3>';
                    for (const [key, value] of Object.entries(renderer.elements)) {
                        const exists = value ? '✅' : '❌';
                        html += `<div>${exists} ${key}</div>`;
                    }
                }
            }
            
            // Check DOM
            html += '<h3>📄 DOM Check</h3>';
            ['player-hand', 'opponent-hand', 'game-container'].forEach(id => {
                const el = document.getElementById(id);
                html += `<div class="${el ? 'ok' : 'err'}">${el ? '✅' : '❌'} #${id}</div>`;
            });
            
            debugContent.innerHTML = html;
        }
        
        // Update debug panel every second
        setInterval(updateDebug, 1000);
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
