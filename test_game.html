<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test Debug</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: monospace; padding: 20px; }
        .log { background: #333; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
        .info { color: #74c0fc; }
    </style>
</head>
<body>
    <h1>🔍 Debug Test Page</h1>
    <div id="output"></div>
    
    <script type="module">
        const output = document.getElementById('output');
        
        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = msg;
            output.appendChild(div);
            console.log(msg);
        }
        
        // Test DOM elements exist
        log('Testing DOM structure...', 'info');
        
        // Load the actual game CSS
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'style.css';
        document.head.appendChild(link);
        log('✅ CSS loaded', 'success');
        
        // Create game container structure manually to verify it works
        const container = document.createElement('div');
        container.id = 'game-container';
        container.innerHTML = `
            <div id="player-hand" class="hand" style="background: rgba(255,0,0,0.2); min-height: 200px;">
                <div style="color: yellow; padding: 20px;">Player hand container ready</div>
            </div>
        `;
        document.body.appendChild(container);
        log('✅ Game container created', 'success');
        
        // Test creating a card element
        const card = document.createElement('div');
        card.className = 'card spell';
        card.innerHTML = `
            <div class="card-cost">1</div>
            <div class="card-name">Test Card</div>
            <div class="card-type">spell</div>
            <div class="card-content"><p>Test description</p></div>
        `;
        container.querySelector('#player-hand').appendChild(card);
        log('✅ Test card created and appended', 'success');
        
        log('DOM test complete! If you see a red-tinted area with a card, the basic rendering works.', 'info');
    </script>
</body>
</html>
