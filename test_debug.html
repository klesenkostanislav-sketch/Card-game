<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Test</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .debug-info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 20px;
            font-family: monospace;
            font-size: 12px;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 9999;
            border: 2px solid #0f0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <header id="game-header">
            <h1>🏰 Mystic Realms - DEBUG MODE</h1>
            <div id="turn-indicator">
                <span id="turn-text">Your Turn</span>
            </div>
        </header>

        <section id="opponent-area">
            <div class="player-info">
                <div class="avatar">🧙‍♂️</div>
                <div class="stats">
                    <div class="stat-bar hp-bar">
                        <span class="label">HP</span>
                        <div class="bar-container">
                            <div id="opponent-hp-bar" class="bar-fill"></div>
                        </div>
                        <span id="opponent-hp" class="value">20/20</span>
                    </div>
                    <div class="stat-bar mana-bar">
                        <span class="label">Mana</span>
                        <div class="bar-container">
                            <div id="opponent-mana-bar" class="bar-fill"></div>
                        </div>
                        <span id="opponent-mana" class="value">0/0</span>
                    </div>
                    <div class="deck-count">📚 Deck: <span id="opponent-deck-count">20</span></div>
                    <div class="hand-count">🎴 Hand: <span id="opponent-hand-count">7</span></div>
                </div>
            </div>
            <div id="opponent-hand" class="hand"></div>
        </section>

        <section id="battle-area">
            <div id="battle-log">
                <div class="log-entry">Debug mode active!</div>
            </div>
        </section>

        <section id="player-area">
            <div id="player-hand" class="hand"></div>
            <div class="player-info">
                <div class="stats">
                    <div class="stat-bar hp-bar">
                        <span class="label">HP</span>
                        <div class="bar-container">
                            <div id="player-hp-bar" class="bar-fill"></div>
                        </div>
                        <span id="player-hp" class="value">20/20</span>
                    </div>
                    <div class="stat-bar mana-bar">
                        <span class="label">Mana</span>
                        <div class="bar-container">
                            <div id="player-mana-bar" class="bar-fill"></div>
                        </div>
                        <span id="player-mana" class="value">0/0</span>
                    </div>
                    <div class="deck-count">📚 Deck: <span id="player-deck-count">20</span></div>
                    <div class="hand-count">🎴 Hand: <span id="player-hand-count">0</span></div>
                </div>
                <div class="avatar">🦸</div>
            </div>
        </section>

        <section id="controls">
            <button id="end-turn-btn" disabled>End Turn</button>
        </section>

        <div id="tooltip" class="tooltip"></div>

        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="game-over-title">Game Over</h2>
                <p id="game-over-message"></p>
                <button id="restart-btn">Play Again</button>
            </div>
        </div>
    </div>

    <div class="debug-info" id="debug-panel">
        <h3>🔍 Debug Panel</h3>
        <div id="debug-content">Initializing...</div>
    </div>

    <script type="module">
        const debugContent = document.getElementById('debug-content');
        
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            debugContent.innerHTML += `<div>[${time}] ${msg}</div>`;
            console.log('[DEBUG]', msg);
        }

        log('Page loaded, checking DOM elements...');

        // Check all required elements
        const elements = [
            'player-hand', 'opponent-hand', 'player-hp', 'player-mana',
            'end-turn-btn', 'battle-log', 'tooltip'
        ];

        elements.forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                log(`✅ Found: #${id}`);
            } else {
                log(`❌ MISSING: #${id}`);
            }
        });

        log('Loading game modules...');

        try {
            const { createGameState, PLAYER_TYPES, startGame } = await import('./game/state.js');
            log('✅ state.js loaded');

            const state = createGameState();
            log(`State created: ${JSON.stringify({ status: state.status, currentPlayer: state.currentPlayer })}`);

            startGame(state);
            log(`✅ Game started! Human hand: ${state.players.human.hand.length} cards`);
            log(`Human deck: ${state.players.human.deck.length} cards`);

            // Show first few cards
            state.players.human.hand.forEach((card, i) => {
                log(`Card ${i}: ${card.name} (${card.type}, cost: ${card.cost})`);
            });

            // Render manually
            const playerHandContainer = document.getElementById('player-hand');
            playerHandContainer.innerHTML = '';

            state.players.human.hand.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = `card ${card.type} playable`;
                cardEl.innerHTML = `
                    <div class="card-cost">${card.cost}</div>
                    <div class="card-name">${card.name}</div>
                    <div class="card-type">${card.type}</div>
                    <div class="card-content">
                        <p>${card.description}</p>
                    </div>
                `;
                cardEl.style.cursor = 'pointer';
                cardEl.addEventListener('click', () => {
                    log(`🖱️ Clicked: ${card.name}`);
                });
                playerHandContainer.appendChild(cardEl);
                log(`✅ Rendered card: ${card.name}`);
            });

            // Update stats
            document.getElementById('player-hp').textContent = `${state.players.human.hp}/${state.players.human.maxHp}`;
            document.getElementById('player-hp-bar').style.width = '100%';
            document.getElementById('player-mana').textContent = `${state.players.human.mana}/${state.players.human.maxMana}`;
            document.getElementById('player-mana-bar').style.width = '0%';
            document.getElementById('player-hand-count').textContent = state.players.human.hand.length;

            log('🎮 Manual render complete! Cards should be visible now.');

        } catch (error) {
            log(`❌ ERROR: ${error.message}`);
            log(`Stack: ${error.stack}`);
            debugContent.innerHTML += `<div style="color:red"><strong>ERROR:</strong> ${error.message}</div>`;
        }
    </script>
</body>
</html>
